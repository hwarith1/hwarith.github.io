
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>After Empire Blog – Hani F. Abdel-Warith</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --ink: #1a1a1a;
      --muted: #6b6b6b;
      --hairline: #e8e8e8;
    }
    body {
      font-family: 'EB Garamond', 'Adobe Garamond Pro', 'Garamond', 'Times New Roman', serif;
      line-height: 1.8;
      background: #ffffff;
      color: var(--ink);
      font-size: 17px;
      font-weight: 400;
    }
    header {
      border-bottom: 1px solid var(--hairline);
      padding: 25px 0;
      background: #ffffff;
    }
    .header-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .site-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.3px;
    }
    nav ul {
      display: flex;
      list-style: none;
      gap: 35px;
    }
    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: color 0.2s ease;
      text-transform: lowercase;
    }
    nav a:hover,
    nav a.active {
      color: var(--ink);
    }
    nav a.active {
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
    }
    .main-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 40px;
      animation: fadeIn 0.6s ease-out;
      text-align: center;
    }
    h1 {
      font-size: 2.8rem;
      font-weight: 300;
      color: var(--ink);
      margin-bottom: 50px;
      letter-spacing: -1px;
    }
    .blog-text {
      font-size: 18px;
      color: #333333;
      margin-bottom: 50px;
      line-height: 1.8;
    }
    .blog-link {
      display: inline-block;
      font-size: 16px;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--hairline);
      padding-bottom: 3px;
      transition: all 0.2s ease;
      margin-bottom: 60px;
    }
    .blog-link:hover {
      border-bottom-color: var(--ink);
      color: #8b6f47;
    }
    .blog-image {
      max-width: 100%;
      height: auto;
      max-height: 500px;
      border: 1px solid var(--hairline);
      display: inline-block;
    }
    footer {
      border-top: 1px solid var(--hairline);
      padding: 40px 0;
      text-align: center;
      margin-top: 80px;
    }
    .footer-text {
      font-size: 14px;
      color: var(--muted);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    a:focus {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
    @media (max-width: 768px) {
      .header-container {
        padding: 0 25px;
        flex-direction: column;
        gap: 20px;
      }
      nav ul { gap: 25px; }
      .main-container { padding: 40px 25px; }
      h1 { font-size: 2.2rem; }
    }
    @media (max-width: 480px) {
      .header-container { padding: 0 20px; }
      nav ul { flex-wrap: wrap; justify-content: center; gap: 20px; }
      .main-container { padding: 30px 20px; }
      h1 { font-size: 1.9rem; }
      .site-title { font-size: 1.2rem; }
      .blog-text { font-size: 16px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-container">
      <a href="index.html" class="site-title">Hani Abdel-Warith</a>
      <nav>
        <ul>
          <li><a href="index.html">about</a></li>
          <li><a href="research.html">research</a></li>
          <li><a href="teaching.html">teaching</a></li>
          <li><a href="blog.html" class="active">blog</a></li>
          <li><a href="cv.html">cv</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="main-container">
    <h1>After Empire Blog</h1>

    <p class="blog-text">You can read my blog <a href="blog/mena-exceptionalism.html" class="blog-link">here</a></p>

    <img src="TahaHussein.jpg" alt="Taha Hussein" class="blog-image">
  </main>

  <footer>
    <div class="footer-text">&copy; 2025 Hani F. Abdel-Warith</div>
  </footer>
</body>
</html>
